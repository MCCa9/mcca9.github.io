<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ska Snacks Store</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>

<body>
    <a-scene background="color: #FAFAFA">
       <a-assets>
        <a-mixin id="wall" geometry="primitive:box; width: 15; height: 6; depth: 0.3;"></a-mixin>
        <a-mixin id="floor" geometry="primitive: box; width:35; height: 0.2; depth: 20;"></a-mixin>.    
        <a-mixin id="pillar"></a-mixin>
        <a-mixin id="primary" material="color: white;"></a-mixin>
        <a-mixin id="secondary" material="color: black;"></a-mixin>
        <a-mixin id="tertiary" material="color: #cecece;"></a-mixin>
        <img id="moon_rough" src="../assets/moon/moon_01_rough_1k.png" alt="">
        <img id="moon_diff" src="../assets/moon/moon_01_diff_1k.png" alt="">
        <img id="moon_normal" src="../assets/moon/moon_01_nor_gl_1k.png" alt="">
        <img id="moon_ao" src="../assets/moon/moon_01_ao_1k.png" alt="">
        <!--<img id="garage_floor_rough" src="../assets/garagefloor/garage_floor_rough_4k.png" alt="">
        <img id="garage_floor_diff" src="../assets/garagefloor/garage_floor_diff_4k.png" alt="">
        <img id="garage_floor_normal" src="../assets/garagefloor/garage_floor_nor_gl_4k.png" alt="">
        <img id="garage_floor_ao" src="../assets/garagefloor/garage_floor_ao_4k.png" alt="">-->
        <img id="aerial_beach_rough" src="../assets/beach/aerial_beach_01_rough_4k.jpg" alt="">
        <img id="aerial_beach_diff" src="../assets/beach/aerial_beach_01_diff_4k.jpg" alt="">
        <img id="aerial_beach_normal" src="../assets/beach/aerial_beach_01_nor_gl_4k.jpg" alt="">
        <img id="aerial_beach_ao" src="../assets/beach/aerial_beach_01_ao_4k.jpg" alt="">
        <img id="logo" src="../assets/logo1.png" alt="">
        <img id="SkaMan" src="../assets/SkaMan.png" alt="">
        <a-asset-item id="SkaManModel" src="../assets/Skaman.glb"></a-asset-item>
        <img id="Checker1" src="../assets/checkertext.png" alt="">
    </a-assets>
    <a-entity id="player" position="15 1.6 0" rotation="0 90 0">
            <!-- camera -->
            <a-entity id="camera" camera wasd-controls look-controls></a-entity>
            <!-- hand controls -->
            <a-entity id="left-hand" raycaster="objects: .floor" oculus-touch-controls="hand: left" blink-controls></a-entity>
            <a-entity id="right-hand" raycaster="objects: .floor" oculus-touch-controls="hand: right" blink-controls></a-entity>
    </a-entity>
    <a-sky color="#66ccff"></a-sky>
