<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ska Snacks Store</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>

</head>
<body>
    <a-scene background="color: #FAFAFA">
       <a-assets>
        <a-mixin id="wall" geometry="primitive:box; width: 15; height: 10; depth: 0.3;"></a-mixin>
        <a-mixin id="floor" geometry="primitive: box; width:35; height: 0.2; depth: 20;" class="floor"></a-mixin>.    
        <a-mixin id="pillar"></a-mixin>
        <a-mixin id="primary" material="color: white;"></a-mixin>
        <a-mixin id="secondary" material="color: black;"></a-mixin>
        <a-mixin id="tertiary" material="color: gray;"></a-mixin>
    </a-assets>
    <a-entity id="player" position="0 1.6 0">
            <!-- camera -->
            <a-entity id="camera" camera wasd-controls look-controls></a-entity>
            <!-- hand controls -->
            <a-entity id="left-hand" raycaster="objects: .floor" oculus-touch-controls="hand: left" blink-controls></a-entity>
            <a-entity id="right-hand" raycaster="objects: .floor" oculus-touch-controls="hand: right" blink-controls></a-entity>
    </a-entity>
    <a-sky color="#66cff"></a-sky>
    <a-entity mixin="wall primary" position="-0.055 5 10.15" geometry="width: 20.5;" ></a-entity>
    <a-entity mixin="wall primary" position="2.5 5 -10.15"  ></a-entity>
    <a-entity mixin="wall primary" position="-9 5 2.15" geometry="width: 16;" rotation="0 90 0 "></a-entity>
    <a-entity mixin="wall primary" geometry="height: 2.5; width: 6" position="-6.93355 1.1 -7.89157" rotation="0 47.41856008282207 0"></a-entity>
    <a-entity mixin="wall primary" position="10.04429 5 -0.10186" geometry="width: 20.5" rotation="0 90 0"></a-entity>
    <a-entity mixin="floor tertiary" position="0 0 0"></a-entity>    
    <a-entity mixin="floor tertiary" geometry="width: 25.08" position="-2.03487 9.9798 0"></a-entity>
    <a-entity mixin="primary" geometry="primitive: cylinder; height: 2; radius: 2" position="2.69747 1.11617 0.20186"></a-entity>
    <a-entity mixin="floor tertiary" geometry="depth: 4.42; height: 1; width: 6.9" material="color: #cdbf92" position="-8.49937 1.97345 -9.54774" rotation="0 47.419 0"></a-entity>  
    <a-entity mixin="wall primary" position="-13.05307 5 -13.8437" geometry="width: 8.81" rotation="0 47.419 0"></a-entity>
    <a-entity mixin="floor tertiary" geometry="depth: 4.42; height: 1; width: 6.9" material="color: #27fffd" position="-11.38867 2.00016 -12.22697" rotation="0 47.419 0"></a-entity>
    <a-entity mixin="wall primary" position="-12.212 5 -8.55134" geometry="width: 8.81" rotation="0 135.2180396508743 0"></a-entity>
    <a-entity mixin="wall primary" position="-5.85113 5 -15.80101" geometry="width: 8.81" rotation="0 -17.971967159868537 0"></a-entity>
    <a-entity mixin="wall primary" position="-2.24082 5.63899 -12.69262" geometry="width: 4.74" rotation="0 90 0"></a-entity>

    </a-scene>
</body>
</html>
