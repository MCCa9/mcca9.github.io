<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Recreation</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
    <a-scene background="color: #FAFAFA">
        
        <a-assets>
            <img id="PlankRough" src="../assets/plank/plank_flooring_04_rough_1k.png" alt="">
            <img id="PlankDiff" src="../assets/plank/plank_flooring_04_diff_1k.png" alt="">
            <img id="PlankNormal" src="../assets/plank/plank_flooring_04_nor_gl_1k.png" alt="">
            <img id="PlankAO" src="../assets/plank/plank_flooring_04_ao_1k.png" alt="">
        </a-assets>

        <a-entity position="2 0 2.5">
        <!-- *door* -->
        <a-box position="-2.75 1.5 -3.5" rotation="0 0 0" color="#F2F2F2" width="1" height="3.175" shadow></a-box>
        <a-box position="-2.75 0.93 -3.00" rotation="0 0 0" color="#C98F30" height="1.9" width="0.6858" depth="0.1"></a-box>
        
        <!-- *desk* -->
        <a-box position="-1.65 0.78 -3.5" rotation="0 0 0" color="white" height="0.1" width="1.2" depth="1" shadow></a-box>
        <a-cylinder position="-2.3 0.224 -2.8" rotation="0 0 0" color="black" height="0.5" width="0.1"  radius="0.2" shadow></a-cylinder>
        <a-light type="ambient" intensity="0.1" position="-2 0 -2"></a-light>
        <a-light type="point" intensity="5" position="-1.16 1.211 -3.6" color="#ffedd6"></a-light>

        <!-- *closet door* -->
        <a-box position="-3.712 0.9 -2.369" rotation="0 -90 0" color="#C98F30" height="1.8" width="1.2" shadow></a-box>

        <!-- *shelving* -->
        <a-box position="-0.690 0.415 -3.25" rotation="0 -90 0" color="black" height="0.82" width="1.5" depth="0.5" shadow></a-box>
        <a-box position="-0.690 1.297 -3.25" rotation="0 -90 0" color="black" height="0.95" width="1.5" depth="0.5" shadow></a-box>

        <!-- *tv stand* -->
        <a-box position="-0.44 0.6 -1.529" rotation="0 0 0" color="#FFEDBF" height="2" width="0.635" shadow></a-box>

        <!-- *game rack* -->
        <a-box position="-1 0.4 -0.63" rotation="0 -90 0" color="black" height="2" width="0.635" shadow></a-box>

        <!-- *bed* -->
        <a-box position="-2.253 0.172 -1.4" rotation="0 0 0" color="black" height="0.3"  width="2"  shadow></a-box>
        <a-box position="-2.253 0.70 -1.4" rotation="0 0 0" color="white" height="0.3" width="2" shadow></a-box>

        <!-- *bedside cart* -->
        <a-box position="-2.9 0.3 -2.1" rotation="90 0 0" color="silver" height="0.25" width="0.3" shadow></a-box>
        
        <!-- *windows* -->
        <a-box position="-2.3 2 -0.4" rotation="0 0 0" color="navy" height="2" width="1" shadow></a-box>
        <a-box position="0.029 2 -2.67" rotation="0 90 0" color="navy" height="2" width="1" shadow></a-box>
        
        <!-- *floors and ceiling* -->
        <a-plane position="0 0 -1.25" rotation="-90 0 0" width="6.5" height="6.5"  material="color:#BA7404; roughness: 0; metalness:0; src: #PlankDiff; roughnessMap:#PlankRough; normalMap:#PlankNormal; ambientOcclusionMap:#PlankAO" shadow></a-plane>
        <a-box position="0 2.754 -1.25" rotation="-90 0 0" width="6.5" height="6.5" color="#BA7404" shadow></a-box>
       
        <!-- *walls* -->
        <a-plane position="-1.334 1.5 -4" rotation="0 0 0" width="1.845" height="3.175" color="#F2F2F2" shadow></a-plane>
        <a-plane position="-1.334 1.5 -0.832" rotation="0 180 0" width="4" height="3.175" color="#F2F2F2" shadow></a-plane>
        <a-plane position="-0.413 1.5 -2.414" rotation="0 -90 0" width="3.175" height="3.175" color="#F2F2F2" shadow></a-plane>
        <a-plane position="-3.250 1.5 -2.414" rotation="0 90 0" width="3.175" height="3.175" color="#F2F2F2" shadow></a-plane>
    </a-entity>
    </a-scene>
</body>
</html>
