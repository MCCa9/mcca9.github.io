<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <a-scene background="color: #FAFAFA">
        <!-- *door* -->
        <a-box position="-3 0.25 -3.5" rotation="0 0 0" color="#F2F2F2" width="3.5" height="6" shadow></a-box>
        <a-box position="-1.5 0.25 -3.5" rotation="0 0 0" color="#F2F2F2" height="6" shadow></a-box>
        <a-box position="-2 0 -2" rotation="0 0 0" color="#C98F30" height="1.9" width="0.6858" depth="0.1"></a-box>
        
        <!-- *desk* -->
        <a-box position="0.25 1 -3.5" rotation="0 0 0" color="white" height="0.2" width="2.5" shadow></a-box>

        <!-- *closet door* -->
        <a-box position="-3.5 0 -2" rotation="0 -90 0" color="#C98F30" height="6" width="1.75" shadow></a-box>
        <a-box position="-3.53 0 -0.5" rotation="0 -90 0" color="#C98F30" height="6" width="1.75" shadow></a-box>

        <!-- *shelving* -->
        <a-box position="2.6 0.5 -2" rotation="0 -90 0" color="black" height="1" width="4.25" shadow></a-box>
        <a-box position="2.7 1.5 -2" rotation="0 -90 0" color="black" height="1.5" width="4.25" shadow></a-box>

        <!-- *tv stand* -->
        <a-box position="2.5 1 1.3" rotation="0 -90 0" color="#FFEDBF" height="2" width="1" shadow></a-box>

        <!-- *game rack* -->
        <a-box position="1.406 0.85 2" rotation="0 -90 0" color="black" height="2" width="0.5" shadow></a-box>

        <!-- *bed* -->
        <a-box position="-1.75 0 1.4" rotation="0 0 0" color="black" height="0.3"  width="2"  shadow></a-box>
        <a-box position="-1.75 0.5 1.4" rotation="0 0 0" color="white" height="0.3" width="2" shadow></a-box>

        <!-- *bedside cart* -->
        <a-box position="-2.7 0.3 0.5" rotation="90 0 0" color="silver" height="0.5" width="0.6" shadow></a-box>
        
        <!-- *windows* -->
        <a-box position="-1 2 2.4" rotation="0 0 0" color="navy" height="2" width="1.75" shadow></a-box>
        <a-box position="3.5 2 0.083" rotation="0 90 0" color="navy" height="2" width="1.75" shadow></a-box>
        
        <!-- *floors and ceiling* -->
        <a-plane position="0 0 -1.25" rotation="-90 0 0" width="6.5" height="6.5" color="#BA7404" shadow></a-plane>
        <a-box position="0 3.75 -1.25" rotation="-90 0 0" width="6.5" height="6.5" color="#F2F2F2" shadow></a-box>
       
        <!-- *walls* -->
        <a-plane position="0 0 -4" rotation="0 0 0" width="6.5" height="6.5" color="#F2F2F2" shadow></a-plane>
        <a-plane position="-3.25 0 -4.5" rotation="0 90 0" width="13" height="6.5" color="#F2F2F2" shadow></a-plane>
        <a-plane position="3.25 0 -4.5" rotation="0 -90 0" width="13" height="6.5" color="#F2F2F2" shadow></a-plane>
        <a-plane position="-3.25 0 -4.5" rotation="0 90 0" width="13" height="6.5" color="#F2F2F2" shadow></a-plane>

        <a-cylinder position="0 1 0" rotation="0 90 0" width="0.6" height="1.905"></a-cylinder>
    </a-scene>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
