<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
       <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.4/dist/aframe-physics-system.min.js"></script>
</head>
<body>
    <a-scene>
        <a-sphere id="ball01" position="-2 4 -5" radius="0.5" color="#fff" static-body></a-sphere>
        <a-sphere id="ball02" position="0 6 -5" radius="0.5" color="#fff" dynamic-body spring="target: #ball01; stiffness: 300; damping: 10; restLength: 1"></a-sphere>
        <a-sphere id="ball03" position="1 6 -5" radius="0.5" color="#fff" dynamic-body spring="target: #ball02; stiffness: 300; damping: 10; restLength: 1"></a-sphere>
    </a-scene>
</body>
</html>
