<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
    <a-scene background="color: #FAFAFA">
        <a-assets>
            <a-mixin id="wall" geometry="primitive: box; width: 2; height: 10; depth: 0.3"></a-mixin>
            <a-mixin id="column" geometry="primitive: cylinder; height: 5; radius: 0.5;"></a-mixin>
            <a-mixin id="primary" material="color: purple"></a-mixin>
            <a-mixin id="secondary" material="color: green"></a-mixin>
        </a-assets>
        <a-entity mixin="wall primary" position="0 2.5 -5" geometry="width:10;"></a-entity>
        <a-entity mixin="wall secondary" position="-5 2.5 0" rotation="0 90 0" geometry="width:10;"></a-entity>
        <a-entity mixin="wall secondary" position="0 2.5 5" rotation="0 0 0" geometry="width:10;"></a-entity>
        <a-entity mixin="wall primary" position="5 2.5 0" rotation="0 90 0" geometry="width:10;"></a-entity>
        <a-entity mixin="column primary" position="0 2.5 0" rotation="0 0 0" geometry="height:10;"></a-entity>

        <a-sky color="#333"></a-sky>
    </a-scene>
</body>
</html>
